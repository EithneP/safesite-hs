<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeSite HS — Health & Safety Platform</title>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --color-primary: #f97316;
  --color-primary-hover: #ea580c;
  --color-success: #22c55e;
  --color-warning: #eab308;
  --color-danger: #ef4444;
  --color-info: #3b82f6;
  --bg: #f8fafc;
  --surface: #ffffff;
  --sidebar-bg: #1e293b;
  --sidebar-text: #b0bec5;
  --sidebar-active: #f97316;
  --text: #0f172a;
  --text-secondary: #64748b;
  --text-muted: #94a3b8;
  --border: #e2e8f0;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
  --shadow-lg: 0 4px 16px rgba(0,0,0,.1);
  --radius: 10px;
  --radius-sm: 6px;
  --transition: .2s ease;
}
html { font-size: 15px; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }
a { color: var(--color-primary); text-decoration: none; }
img { max-width: 100%; }
/* ===== Sidebar ===== */
.sidebar { width: 260px; min-height: 100vh; background: var(--sidebar-bg); color: var(--sidebar-text); position: fixed; left: 0; top: 0; bottom: 0; display: flex; flex-direction: column; z-index: 100; transition: transform var(--transition); }
.sidebar-brand { padding: 24px 20px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,.06); }
.sidebar-brand .logo-icon { width: 40px; height: 40px; background: #c2410c; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 1.1rem; }
.sidebar-brand h1 { font-size: 1.15rem; color: #fff; font-weight: 700; }
.sidebar-brand p { font-size: .7rem; opacity: .8; margin-top: 1px; }
.sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: var(--radius-sm); color: var(--sidebar-text); cursor: pointer; transition: var(--transition); font-size: .9rem; margin-bottom: 2px; }
.nav-item:hover { background: rgba(255,255,255,.06); color: #e2e8f0; }
.nav-item.active { background: #c2410c; color: #fff; font-weight: 600; }
.nav-item i { width: 20px; height: 20px; flex-shrink: 0; }
.sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,.06); font-size: .75rem; }
/* ===== Main Content ===== */
.main-content { flex: 1; margin-left: 260px; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
.topbar h2 { font-size: 1.2rem; font-weight: 700; }
.topbar-actions { display: flex; align-items: center; gap: 10px; }
.content { padding: 24px 28px; }
/* ===== Buttons ===== */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: var(--radius-sm); font-size: .85rem; font-weight: 600; border: none; cursor: pointer; transition: var(--transition); }
.btn i { width: 16px; height: 16px; }
.btn-primary { background: var(--color-primary); color: #fff; }
.btn-primary:hover { background: var(--color-primary-hover); }
.btn-secondary { background: var(--border); color: var(--text); }
.btn-secondary:hover { background: #cbd5e1; }
.btn-success { background: var(--color-success); color: #fff; }
.btn-danger { background: var(--color-danger); color: #fff; }
.btn-sm { padding: 6px 12px; font-size: .8rem; }
.btn-ghost { background: transparent; color: var(--text-secondary); }
.btn-ghost:hover { background: var(--border); }
/* ===== Cards ===== */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.card-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.card-header h3 { font-size: 1rem; }
.card-body { padding: 20px; }
/* ===== Stats Grid ===== */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { display: flex; align-items: center; gap: 16px; padding: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
.stat-icon { width: 48px; height: 48px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.stat-icon.primary { background: rgba(249,115,22,.1); color: var(--color-primary); }
.stat-icon.success { background: rgba(34,197,94,.1); color: var(--color-success); }
.stat-icon.warning { background: rgba(234,179,8,.1); color: var(--color-warning); }
.stat-icon.danger { background: rgba(239,68,68,.1); color: var(--color-danger); }
.stat-icon.info { background: rgba(59,130,246,.1); color: var(--color-info); }
.stat-info h3 { font-size: 1.5rem; font-weight: 700; line-height: 1; }
.stat-info p { font-size: .8rem; color: var(--text-secondary); margin-top: 2px; }
/* ===== Tables ===== */
.table-container { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th, td { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border); }
th { font-weight: 600; font-size: .8rem; text-transform: uppercase; letter-spacing: .5px; color: var(--text-secondary); background: var(--bg); }
/* ===== Forms ===== */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-weight: 600; font-size: .85rem; margin-bottom: 5px; }
.form-input, .form-select, .form-textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: .9rem; font-family: inherit; transition: var(--transition); background: var(--surface); color: var(--text); }
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(249,115,22,.15); }
.form-hint { font-size: .75rem; color: var(--text-muted); margin-top: 3px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.filter-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-bar .form-select, .filter-bar .form-input { width: auto; min-width: 180px; }
/* ===== Badges ===== */
.badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 100px; font-size: .75rem; font-weight: 600; }
.badge-success { background: rgba(34,197,94,.1); color: var(--color-success); }
.badge-warning { background: rgba(234,179,8,.1); color: var(--color-warning); }
.badge-danger { background: rgba(239,68,68,.1); color: var(--color-danger); }
.badge-info { background: rgba(59,130,246,.1); color: var(--color-info); }
.badge-neutral { background: var(--border); color: var(--text-secondary); }
/* ===== Alerts ===== */
.alert { display: flex; align-items: flex-start; gap: 10px; padding: 14px 18px; border-radius: var(--radius-sm); font-size: .9rem; }
.alert i { flex-shrink: 0; margin-top: 1px; }
.alert-success { background: rgba(34,197,94,.1); color: #16a34a; }
.alert-warning { background: rgba(234,179,8,.1); color: #ca8a04; }
.alert-danger { background: rgba(239,68,68,.1); color: #dc2626; }
.alert-info { background: rgba(59,130,246,.1); color: #2563eb; }
/* ===== Tabs ===== */
.tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
.tab-btn { padding: 10px 18px; border: none; background: none; font-size: .9rem; font-weight: 600; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: var(--transition); }
.tab-btn.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
.tab-btn:hover { color: var(--text); }
/* ===== Modal ===== */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 200; }
.modal { background: var(--surface); border-radius: var(--radius); width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; border-bottom: 1px solid var(--border); }
.modal-header h3 { font-size: 1.1rem; }
.modal-body { padding: 24px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 24px; border-top: 1px solid var(--border); }
/* ===== Toast ===== */
.toast-container { position: fixed; top: 20px; right: 20px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 12px 20px; border-radius: var(--radius-sm); font-size: .85rem; font-weight: 500; color: #fff; box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 8px; animation: slideIn .3s ease; }
.toast-success { background: #16a34a; }
.toast-error { background: #dc2626; }
.toast-warning { background: #ca8a04; }
.toast-info { background: #2563eb; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
/* ===== Photo Gallery ===== */
.photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-top: 12px; }
.photo-card { border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); position: relative; }
.photo-card img { width: 100%; height: 140px; object-fit: cover; }
.photo-card .photo-caption { padding: 8px 10px; font-size: .8rem; }
.photo-card .photo-delete { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,.6); color: #fff; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }
/* ===== Empty State ===== */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state i { width: 48px; height: 48px; margin-bottom: 12px; opacity: .4; }
.empty-state p { margin-bottom: 16px; }
/* ===== Staff Grid ===== */
.staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.staff-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; display: flex; gap: 14px; align-items: flex-start; cursor: pointer; transition: var(--transition); }
.staff-card:hover { box-shadow: var(--shadow-lg); border-color: var(--color-primary); }
.staff-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--color-primary); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .95rem; flex-shrink: 0; }
.staff-card-info h4 { font-size: .95rem; margin-bottom: 3px; }
.staff-card-info p { font-size: .8rem; color: var(--text-secondary); }
.staff-card-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
/* ===== Report ===== */
.report-tab { margin-top: 8px; }
/* ===== Print ===== */
@media print { .sidebar, .topbar { display: none; } .main-content { margin-left: 0; } }
/* ===== Responsive ===== */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0; }
  .form-row { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .staff-grid { grid-template-columns: 1fr; }
  .content { padding: 16px; }
}
    </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div class="logo-icon">SS</div>
        <div><h1>SafeSite HS</h1><p>Health & Safety Platform</p></div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-item active" data-page="dashboard"><i data-lucide="layout-dashboard"></i> Dashboard</div>
        <div class="nav-item" data-page="staff"><i data-lucide="users"></i> Staff</div>
        <div class="nav-item" data-page="certificates"><i data-lucide="award"></i> Certificates</div>
        <div class="nav-item" data-page="sites"><i data-lucide="building-2"></i> Sites</div>
        <div class="nav-item" data-page="notifications"><i data-lucide="bell"></i> Notifications</div>

    </nav>
    <div class="sidebar-footer">SafeSite HS v1.0</div>
</aside>

<!-- Main Content -->
<main class="main-content">
    <header class="topbar">
        <h2 id="pageTitle">Dashboard</h2>
        <div class="topbar-actions">
            <button class="btn btn-primary" id="topAction" style="display:none"></button>
        </div>
    </header>
    <div class="content" id="pageContent"></div>
</main>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>

      { id: 4, name: 'James O\'Brien', role: 'Scaffolder', phone: '07700 900401', email: 'james.obrien@safesite.co.uk', site: 2, startDate: '2023-06-20', emergencyContact: 'Aoife O\'Brien', emergencyPhone: '07700 900402', status: 'active', induction: true, inductionDate: '2023-06-20', photo: '' },

    ],
    notifications: [],
    riskAssessments: [],
    nextId: 50
  };
}

function getData() {
  try {
    var raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return getDefaultData();
}

function setData(partial) {
  var data = getData();
  Object.assign(data, partial);
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
}

function genId() {
  var data = getData();
  var id = data.nextId || 1;
  data.nextId = id + 1;
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
  return id;
}

function getStaff(id) {
  return getData().staff.find(function(s) { return s.id == id; });
}

function getSite(id) {
  return getData().sites.find(function(s) { return s.id == id; });
}

function getCertsForStaff(staffId) {
  return getData().certificates.filter(function(c) { return c.staffId == staffId; });
}

function certStatus(c) {
  var now = new Date();
  var exp = new Date(c.expiryDate);
  var diff = Math.ceil((exp - now) / (1000*60*60*24));
  if (diff < 0) return 'expired';
  var days = getData().settings.notifyDaysBefore || 30;
  if (diff <= 7) return 'critical';
  if (diff <= days) return 'warning';
  return 'valid';
}

function statusBadge(status) {
  var map = { valid: '<span class="badge badge-success">Valid</span>', warning: '<span class="badge badge-warning">Expiring</span>', critical: '<span class="badge badge-danger">Critical</span>', expired: '<span class="badge badge-danger">Expired</span>' };
  return map[status] || '';
}

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}

function daysUntilExpiry(c) {
  var now = new Date();
  var exp = new Date(c.expiryDate);
  return Math.ceil((exp - now) / (1000*60*60*24));
}

function getExpiringCerts(days) {
  var data = getData();
  return data.certificates.filter(function(c) {
    var d = daysUntilExpiry(c);
    return d >= 0 && d <= days;
  });
}

function getExpiredCerts() {
  return getData().certificates.filter(function(c) { return daysUntilExpiry(c) < 0; });
}

function importTimeKeeperData(records) {
  var data = getData();
  var sitesFound = [];
  records.forEach(function(r) {
    if (r.siteName && data.sites.indexOf(function(s){ return s.name === r.siteName; }) === -1) {
      var existing = data.sites.find(function(s){ return s.name === r.siteName; });
      if (!existing) {
        var siteId = genId();
        data.sites.push({ id: siteId, name: r.siteName, address: '', postcode: '', manager: '', notes: '' });
        sitesFound.push(r.siteName);
      }
    }
  });
  data.settings.lastTimeKeeperImport = new Date().toISOString();
  setData(data);
  return { imported: records.length, sites: sitesFound.length > 0 ? sitesFound : data.sites.map(function(s){return s.name;}) };
}

// ============ UI HELPERS ============

function toast(msg, type) {
  type = type || 'info';
  var container = document.getElementById('toastContainer');
  var el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(function() { el.remove(); }, 3500);
}

function showModal(title, bodyHtml, footerHtml) {
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'activeModal';
  overlay.innerHTML = '<div class="modal"><div class="modal-header"><h3>' + title + '</h3><button class="btn btn-ghost btn-sm" id="closeModal">&times;</button></div><div class="modal-body">' + bodyHtml + '</div>' + (footerHtml ? '<div class="modal-footer">' + footerHtml + '</div>' : '') + '</div>';
  document.body.appendChild(overlay);
  document.getElementById('closeModal').onclick = closeModal;
  overlay.onclick = function(e) { if (e.target === overlay) closeModal(); };
  lucide.createIcons();
}

function closeModal() {
  var m = document.getElementById('activeModal');
  if (m) m.remove();
}

function exportAllData() {
  var data = getData();
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'safesite_backup_' + new Date().toISOString().split('T')[0] + '.json';
  a.click(); URL.revokeObjectURL(url);
  toast('Data exported', 'success');
}

    if (expiring > 0) alerts += '<div class="alert alert-warning" style="margin-bottom:10px"><i data-lucide="clock"></i><div><strong>' + expiring + ' certificate(s) expiring soon</strong> — within ' + (data.settings.notifyDaysBefore||30) + ' days.</div></div>';
    c.innerHTML += '<div class="card" style="margin-bottom:24px"><div class="card-header"><h3>Compliance Alerts</h3></div><div class="card-body">' + alerts + '</div></div>';
  }

  if (data.staff.length > 0) {
    var recentStaff = data.staff.slice(-5).reverse();
    var rows = recentStaff.map(function(s) {
      var certs = getCertsForStaff(s.id);
      var siteNames = s.sites.map(function(i){var si=getSite(i);return si?si.name:''}).filter(Boolean).join(', ') || '—';
      return '<tr><td><strong>' + s.firstName + ' ' + s.lastName + '</strong></td><td>' + (s.trades.join(', ') || '—') + '</td><td>' + siteNames + '</td><td>' + certs.length + '</td></tr>';
    }).join('');

  }

  hideTopAction();
  lucide.createIcons();
}

function filterStaff() {
  var q = document.getElementById('staffSearch').value.toLowerCase();

  cards.forEach(function(card) {
    card.style.display = card.textContent.toLowerCase().indexOf(q) !== -1 ? '' : 'none';

function showAddStaffModal() {
  var siteOpts = getData().sites.map(function(s){return '<label style="display:flex;align-items:center;gap:6px;font-weight:normal;cursor:pointer"><input type="checkbox" value="' + s.id + '" class="staffSiteCheck"> ' + s.name + '</label>'}).join('');

function saveStaff() {
  var first = document.getElementById('staffFirst').value.trim();
  var last = document.getElementById('staffLast').value.trim();
  if (!first || !last) { toast('First and last name are required', 'error'); return; }
  var siteChecks = document.querySelectorAll('.staffSiteCheck:checked');
  var sites = Array.from(siteChecks).map(function(cb){return parseInt(cb.value)});
  var trades = document.getElementById('staffTrades').value.split(',').map(function(t){return t.trim()}).filter(Boolean);
  var data = getData();
  data.staff.push({
    id: genId(),
    firstName: first,
    lastName: last,
    phone: document.getElementById('staffPhone').value.trim(),
    email: document.getElementById('staffEmail').value.trim(),
    startDate: document.getElementById('staffStart').value,
    timekeeperId: document.getElementById('staffTK').value.trim(),
    trades: trades,
    sites: sites
  });
  setData(data);
  closeModal();
  toast('Staff member added', 'success');
  renderStaffPage();
}

function showStaffDetail(id) {
  var s = getStaff(id);
  if (!s) return;
  var certs = getCertsForStaff(s.id);
  var siteNames = s.sites.map(function(i){var si=getSite(i);return si?si.name:''}).filter(Boolean);
  var certRows = certs.map(function(c){return '<tr><td>' + c.type + '</td><td>' + (c.number||'—') + '</td><td>' + formatDate(c.issueDate) + '</td><td>' + formatDate(c.expiryDate) + '</td><td>' + statusBadge(certStatus(c)) + '</td><td><button class="btn btn-sm btn-ghost" onclick="editCert(' + c.id + ')"><i data-lucide="pencil"></i></button> <button class="btn btn-sm btn-ghost" style="color:var(--color-danger)" onclick="deleteCert(' + c.id + ',' + s.id + ')"><i data-lucide="trash-2"></i></button></td></tr>'}).join('');

  var body = '<div style="margin-bottom:16px"><h4>Contact Details</h4><p style="font-size:.85rem;color:var(--text-secondary);margin-top:6px">Phone: ' + (s.phone||'—') + '<br>Email: ' + (s.email||'—') + '<br>Start: ' + formatDate(s.startDate) + '<br>TK ID: ' + (s.timekeeperId||'—') + '<br>Trades: ' + (s.trades.join(', ')||'—') + '<br>Sites: ' + (siteNames.join(', ')||'—') + '</p></div><h4 style="margin-bottom:8px">Certificates (' + certs.length + ')</h4>' + (certs.length > 0 ? '<div class="table-container"><table><thead><tr><th>Type</th><th>Number</th><th>Issue</th><th>Expiry</th><th>Status</th><th></th></tr></thead><tbody>' + certRows + '</tbody></table></div>' : '<p style="color:var(--text-muted)">No certificates on file</p>') + '<button class="btn btn-sm btn-primary" style="margin-top:12px" onclick="closeModal();showAddCertModal(' + s.id + ')"><i data-lucide="plus"></i> Add Certificate</button>';
  showModal(s.firstName + ' ' + s.lastName, body, '<button class="btn btn-danger" onclick="deleteStaff(' + s.id + ')"><i data-lucide="trash-2"></i> Delete</button><button class="btn btn-secondary" onclick="closeModal()">Close</button>');
}

function deleteStaff(id) {
  if (!confirm('Delete this staff member and all their certificates?')) return;
  var data = getData();
  data.staff = data.staff.filter(function(s){return s.id != id});
  data.certificates = data.certificates.filter(function(c){return c.staffId != id});
  setData(data);
  closeModal();
  toast('Staff member deleted', 'success');
  renderStaffPage();
}

// ============ CERTIFICATES ============
function renderCertificatesPage() {
  document.getElementById('pageTitle').textContent = 'Certificates';
  var data = getData();
  var c = document.getElementById('pageContent');
  var certs = data.certificates;

  showTopAction('Add Certificate', 'award', function() { showAddCertModal(); });

    return;
  }

  var rows = certs.map(function(cert) {
    var s = getStaff(cert.staffId);

    return '<tr><td><strong>' + name + '</strong></td><td>' + cert.type + '</td><td>' + (cert.number||'—') + '</td><td>' + formatDate(cert.expiryDate) + '</td><td>' + statusBadge(certStatus(cert)) + '</td><td>' + siteNames + '</td><td><button class="btn btn-sm btn-ghost" onclick="editCert(' + cert.id + ')"><i data-lucide="pencil"></i></button> <button class="btn btn-sm btn-ghost" style="color:var(--color-danger)" onclick="deleteCertDirect(' + cert.id + ')"><i data-lucide="trash-2"></i></button></td></tr>';
  }).join('');

  c.innerHTML = '<div class="filter-bar"><select class="form-select" id="certFilter" onchange="filterCerts()"><option value="all">All Certificates</option><option value="expired">Expired</option><option value="warning">Expiring Soon</option><option value="valid">Valid</option></select></div><div class="table-container"><table id="certTable"><thead><tr><th>Staff</th><th>Type</th><th>Number</th><th>Expiry</th><th>Status</th><th>Sites</th><th></th></tr></thead><tbody>' + rows + '</tbody></table></div>';
  lucide.createIcons();
}

function filterCerts() {
  var filter = document.getElementById('certFilter').value;
  var rows = document.querySelectorAll('#certTable tbody tr');
  rows.forEach(function(row) {
    if (filter === 'all') { row.style.display = ''; return; }
    var badge = row.querySelector('.badge');
    if (!badge) { row.style.display = ''; return; }
    var text = badge.textContent.toLowerCase();
    if (filter === 'expired' && text !== 'expired') row.style.display = 'none';
    else if (filter === 'warning' && text !== 'expiring' && text !== 'critical') row.style.display = 'none';
    else if (filter === 'valid' && text !== 'valid') row.style.display = 'none';
    else row.style.display = '';
  });
}

function showAddCertModal(staffId) {
  var data = getData();
  var staffOpts = data.staff.map(function(s){return '<option value="' + s.id + '"' + (s.id == staffId ? ' selected' : '') + '>' + s.firstName + ' ' + s.lastName + '</option>'}).join('');
  var body = '<div class="form-group"><label>Staff Member *</label><select class="form-select" id="certStaff">' + staffOpts + '</select></div><div class="form-row"><div class="form-group"><label>Certificate Type *</label><input type="text" class="form-input" id="certType" placeholder="e.g. CSCS Card"></div><div class="form-group"><label>Certificate Number</label><input type="text" class="form-input" id="certNumber"></div></div><div class="form-row"><div class="form-group"><label>Issue Date</label><input type="date" class="form-input" id="certIssue"></div><div class="form-group"><label>Expiry Date *</label><input type="date" class="form-input" id="certExpiry"></div></div><div class="form-group"><label>Notes</label><textarea class="form-textarea" id="certNotes" rows="2"></textarea></div><div class="form-group"><label>Risk Assessment Photos</label><input type="file" class="form-input" id="certPhotos" accept="image/*" multiple><span class="form-hint">Upload photos of risk assessments or site conditions</span></div><div id="photoPreview" style="margin-top:8px"></div>';
  var footer = '<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveCert()">Save Certificate</button>';
  showModal('Add Certificate', body, footer);
  if (document.getElementById('certPhotos')) {
    document.getElementById('certPhotos').onchange = function(e) {
      var preview = document.getElementById('photoPreview');
      preview.innerHTML = '';
      Array.from(e.target.files).forEach(function(file) {
        var reader = new FileReader();
        reader.onload = function(ev) {
          var div = document.createElement('div');
          div.style.cssText = 'display:inline-block;margin:4px;position:relative';
          div.innerHTML = '<img src="' + ev.target.result + '" style="width:80px;height:80px;object-fit:cover;border-radius:6px;border:1px solid var(--border)">';
          preview.appendChild(div);
        };
        reader.readAsDataURL(file);
      });
    };
  }
}

function saveCert() {
  var staffId = document.getElementById('certStaff').value;
  var type = document.getElementById('certType').value.trim();
  var expiry = document.getElementById('certExpiry').value;
  if (!staffId || !type || !expiry) { toast('Staff, type, and expiry date are required', 'error'); return; }
  var data = getData();
  var photos = [];
  var fileInput = document.getElementById('certPhotos');
  if (fileInput && fileInput.files.length > 0) {
    Array.from(fileInput.files).forEach(function(file) {
      // Store photo references (in a real app, upload to server)
      photos.push({ name: file.name, size: file.size });
    });
  }
  data.certificates.push({
    id: genId(),
    staffId: parseInt(staffId),
    type: type,
    number: document.getElementById('certNumber').value.trim(),
    issueDate: document.getElementById('certIssue').value,
    expiryDate: expiry,
    notes: document.getElementById('certNotes').value.trim(),
    photos: photos
  });
  setData(data);
  closeModal();
  toast('Certificate added', 'success');
  renderCertificatesPage();
}

function editCert(id) {
  var data = getData();
  var cert = data.certificates.find(function(c){return c.id == id});
  if (!cert) return;
  var staffOpts = data.staff.map(function(s){return '<option value="' + s.id + '"' + (s.id == cert.staffId ? ' selected' : '') + '>' + s.firstName + ' ' + s.lastName + '</option>'}).join('');
  var body = '<div class="form-group"><label>Staff Member</label><select class="form-select" id="editCertStaff">' + staffOpts + '</select></div><div class="form-row"><div class="form-group"><label>Certificate Type</label><input type="text" class="form-input" id="editCertType" value="' + cert.type + '"></div><div class="form-group"><label>Certificate Number</label><input type="text" class="form-input" id="editCertNumber" value="' + (cert.number||'') + '"></div></div><div class="form-row"><div class="form-group"><label>Issue Date</label><input type="date" class="form-input" id="editCertIssue" value="' + (cert.issueDate||'') + '"></div><div class="form-group"><label>Expiry Date</label><input type="date" class="form-input" id="editCertExpiry" value="' + (cert.expiryDate||'') + '"></div></div><div class="form-group"><label>Notes</label><textarea class="form-textarea" id="editCertNotes" rows="2">' + (cert.notes||'') + '</textarea></div>';
  var footer = '<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="updateCert(' + id + ')">Update</button>';
  showModal('Edit Certificate', body, footer);
}

function updateCert(id) {
  var data = getData();
  var idx = data.certificates.findIndex(function(c){return c.id == id});
  if (idx === -1) return;
  data.certificates[idx] = Object.assign({}, data.certificates[idx], {
    staffId: parseInt(document.getElementById('editCertStaff').value),
    type: document.getElementById('editCertType').value.trim(),
    number: document.getElementById('editCertNumber').value.trim(),
    issueDate: document.getElementById('editCertIssue').value,
    expiryDate: document.getElementById('editCertExpiry').value,
    notes: document.getElementById('editCertNotes').value.trim()
  });
  setData(data);
  closeModal();
  toast('Certificate updated', 'success');
  renderCertificatesPage();
}

function deleteCert(id, staffId) {
  if (!confirm('Delete this certificate?')) return;

  setData(data);
  closeModal();
  toast('Certificate deleted', 'success');

}

function deleteCertDirect(id) {

function saveSite() {
  var name = document.getElementById('siteName').value.trim();

  data.certificates.forEach(function(cert) {

    if (status === 'expired') {
      items.push({ type: 'danger', icon: 'alert-circle', text: (s ? s.firstName + ' ' + s.lastName : 'Unknown') + ' — ' + cert.type + ' has expired', date: cert.expiryDate });

    }
  });

  items.sort(function(a,b){ return new Date(a.date) - new Date(b.date); });

  if (items.length === 0) {
    c.innerHTML = '<div class="empty-state"><i data-lucide="bell-off"></i><p>No active notifications. All certificates are in order.</p></div>';

  lucide.createIcons();
}

function handleTKFile(file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) { processTKCSV(e.target.result); };
  reader.readAsText(file);
}

function processTKCSV(csvText) {
  var lines = csvText.split('\n').map(function(l){return l.trim()}).filter(Boolean);
  if (lines.length < 2) { toast('CSV must have a header and data rows','error'); return; }
  var headers = lines[0].toLowerCase().split(',').map(function(h){return h.trim()});
  var records = [];
  for (var i = 1; i < lines.length; i++) {
    var vals = lines[i].split(',').map(function(v){return v.trim()});
    if (vals.length < headers.length) continue;
    var rec = {};
    headers.forEach(function(h, idx){ rec[h] = vals[idx]; });
    records.push({ staffId:rec.staffid||rec.staff_id||rec.id||'', firstName:rec.firstname||rec.first_name||'', lastName:rec.lastname||rec.last_name||'', siteName:rec.sitename||rec.site_name||rec.site||'', date:rec.date||rec.timestamp||'' });
  }
  document.getElementById('tkPreview').style.display = 'block';
  document.getElementById('tkPreviewTable').innerHTML = '<table><thead><tr>'+headers.map(function(h){return '<th>'+h+'</th>'}).join('')+'</tr></thead><tbody>'+records.slice(0,10).map(function(r){return '<tr><td>'+r.staffId+'</td><td>'+r.firstName+'</td><td>'+r.lastName+'</td><td>'+r.siteName+'</td><td>'+r.date+'</td></tr>'}).join('')+(records.length>10?'<tr><td colspan="'+headers.length+'" style="color:var(--text-muted)">... and '+(records.length-10)+' more</td></tr>':'')+'</tbody></table>';
  document.getElementById('tkImportBtn').onclick = function(){
    var result = importTimeKeeperData(records);
    toast('Imported '+result.imported+' records across '+result.sites.length+' site(s)','success');
    document.getElementById('tkImportResult').style.display = 'block';
    document.getElementById('tkImportResult').innerHTML = '<div class="alert alert-success"><i data-lucide="check-circle"></i><div><strong>Import Complete!</strong> '+result.imported+' records imported. Sites: '+result.sites.join(', ')+'</div></div>';
    lucide.createIcons();
  };
}

// ============ NAVIGATION & INIT ============
var pages = {
  dashboard: renderDashboard,
  staff: renderStaffPage,
  certificates: renderCertificatesPage,
  sites: renderSitesPage,
  notifications: renderNotificationsPage,
  reports: renderReportsPage,
  settings: renderSettingsPage
};

var currentPage = 'dashboard';

function navigateTo(page) {
  if (!pages[page]) return;
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(function(item) {
    item.classList.toggle('active', item.dataset.page === page);
  });
  pages[page]();
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
}

function showTopAction(label, onclick) {
  var btn = document.getElementById('topAction');
  btn.style.display = '';
  btn.textContent = label;
  btn.onclick = function() { window[onclick](); };
}

function hideTopAction() {
  document.getElementById('topAction').style.display = 'none';
}

// Sidebar navigation
document.querySelectorAll('.nav-item').forEach(function(item) {
  item.addEventListener('click', function() {
    navigateTo(item.dataset.page);
  });
});

// Initial render
lucide.createIcons();
navigateTo('dashboard');
</script>
</body>
</html>
