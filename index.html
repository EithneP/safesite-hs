<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeSite — Construction Health & Safety Platform</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <i data-lucide="hard-hat" class="sidebar__logo-icon"></i>
        <span class="sidebar__logo-text">SafeSite</span>
      </div>
      <nav class="sidebar__nav" id="sidebarNav">
        <button class="sidebar__link sidebar__link--active" data-page="dashboard">
          <i data-lucide="layout-dashboard"></i>
          <span>Dashboard</span>
        </button>
        <button class="sidebar__link" data-page="staff">
          <i data-lucide="users"></i>
          <span>Staff</span>
        </button>
        <button class="sidebar__link" data-page="sites">
          <i data-lucide="building-2"></i>
          <span>Sites</span>
        </button>
        <button class="sidebar__link" data-page="certificates">
          <i data-lucide="award"></i>
          <span>Certificates</span>
        </button>
        <button class="sidebar__link" data-page="reports">
          <i data-lucide="file-bar-chart"></i>
          <span>Reports</span>
        </button>
      </nav>
      <div class="sidebar__footer">
        <div class="sidebar__user">
          <div class="sidebar__avatar">JD</div>
          <div class="sidebar__user-info">
            <span class="sidebar__user-name">John Doe</span>
            <span class="sidebar__user-role">Safety Manager</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main content area -->
    <main class="main-content">
      <!-- Top bar -->
      <header class="topbar">
        <button class="topbar__menu-btn" id="menuToggle" aria-label="Toggle navigation menu">
          <i data-lucide="menu"></i>
        </button>
        <h1 class="topbar__title" id="pageTitle">Dashboard</h1>
        <div class="topbar__actions">
          <button class="topbar__icon-btn" id="notifBtn" aria-label="Notifications">
            <i data-lucide="bell"></i>
            <span class="topbar__badge" id="notifBadge">0</span>
          </button>
        </div>
      </header>

      <!-- Page content -->
      <div class="page-content" id="pageContent">
        <!-- Dynamically rendered -->
      </div>
    </main>

    <!-- Notifications pane (slides in from right) -->
    <aside class="notifications-pane" id="notificationsPane">
      <div class="notifications-pane__header">
        <h2>Notifications</h2>
        <button class="notifications-pane__close" id="notifClose" aria-label="Close notifications">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div class="notifications-pane__body" id="notificationsList">
        <!-- Dynamically rendered -->
      </div>
    </aside>

    <!-- Modal overlay -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal" id="modal">
        <div class="modal__header">
          <h2 class="modal__title" id="modalTitle"></h2>
          <button class="modal__close" id="modalClose" aria-label="Close modal">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="modal__body" id="modalBody">
          <!-- Dynamically rendered -->
        </div>
        <div class="modal__footer" id="modalFooter">
          <!-- Dynamically rendered -->
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
